server:
  env: dev
  http:
    addr: 0.0.0.0:8000
    timeout: 1000s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 3s
data:
  database:
    driver: sqlite
    # SQLite 本地文件 + WAL 模式 + 启用外键 + 等锁 5s + 同步 NORMAL
    source: "file:/app/data/seas.db?_journal_mode=WAL&_busy_timeout=5000&_foreign_keys=ON&_synchronous=NORMAL"
  redis:
    addr: redis:6379
    pw: ""
    db: 0
    warn_limit: 100
llm:
  provider: ark
  model: deepseek-r1-250528
  # 构建时通过 docker build --build-arg 传入，或使用 .env 文件
  api_key: ${LLM_API_KEY}
  api_base: https://ark.cn-beijing.volces.com/api/v3
  region: cn-beijing
  temperature: 0.2
  max_iterations: 8
  system_prompt: You are a data analysis assistant for school exam reporting.

auth:
  # 构建时通过 docker build --build-arg 传入
  jwt_secret: ${JWT_SECRET}
  wechat_token: ${WECHAT_TOKEN}
  wechat_qr_url: "https://mp.weixin.qq.com/"
