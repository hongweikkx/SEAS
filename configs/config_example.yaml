env: dev
server:
  http:
    addr: 0.0.0.0:8000
    timeout: 30s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: sqlite
    # SQLite 本地文件 + WAL 模式 + 启用外键 + 等锁 5s + 同步 NORMAL
    # 数据库文件由进程在启动时自动创建(目录 ./data 需存在)
    source: "file:./data/seas.db?_journal_mode=WAL&_busy_timeout=5000&_foreign_keys=ON&_synchronous=NORMAL"
  redis:
    addr: localhost:6379
    pw: ""
    db: 0
    warn_limit: 100
llm:
  provider: ark
  model: doubao-seed-1.6
  api_key: your-ark-api-key
  api_base: https://ark.cn-beijing.volces.com/api/v3
  region: cn-beijing
  temperature: 0.2
  max_iterations: 8
  system_prompt: You are a data analysis assistant for school exam reporting.
auth:
  jwt_secret: your-jwt-secret-key
  wechat_token: your-wechat-token
  wechat_qr_url: https://mp.weixin.qq.com/
