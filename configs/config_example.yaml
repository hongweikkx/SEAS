server:
  env: dev
  http:
    addr: 0.0.0.0:8000
    timeout: 30s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
data:
  database:
    driver: mysql
    source: {username}:{password}@tcp({host}:{port})/{dbname}?parseTime=True&loc=Local
llm:
  provider: ark
  model: doubao-seed-1.6
  api_key: your-ark-api-key
  api_base: https://ark.cn-beijing.volces.com/api/v3
  region: cn-beijing
  temperature: 0.2
  max_iterations: 8
  system_prompt: You are a data analysis assistant for school exam reporting.
