syntax = "proto3";

package seas.v1;

import "google/api/annotations.proto";

option go_package = "api/seas/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.seas.v1";
option java_outer_classname = "seasProtoV1";

service Analysis {
  // 新增接口：考试列表
  rpc ListExams (ListExamsRequest) returns (ListExamsReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams"
    };
  }

  // 新增接口：获取考试关联的学科列表
  rpc ListSubjectsByExam (ListSubjectsByExamRequest) returns (ListSubjectsByExamReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/subjects"
    };
  }

  // 新增接口：学科情况汇总
  rpc GetSubjectSummary (GetSubjectSummaryRequest) returns (GetSubjectSummaryReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/analysis/subject-summary"
    };
  }

  // 新增接口：班级情况汇总
  rpc GetClassSummary (GetClassSummaryRequest) returns (GetClassSummaryReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/analysis/class-summary"
    };
  }

  // 新增接口：班级学科下钻
  rpc GetClassSubjectSummary (GetClassSubjectSummaryRequest) returns (GetClassSubjectSummaryReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/classes/{class_id}/subjects"
    };
  }

  // 新增接口：单科班级汇总
  rpc GetSingleClassSummary (GetSingleClassSummaryRequest) returns (GetSingleClassSummaryReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/subjects/{subject_id}/classes"
    };
  }

  // 新增接口：单科班级题目汇总
  rpc GetSingleClassQuestions (GetSingleClassQuestionsRequest) returns (GetSingleClassQuestionsReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/subjects/{subject_id}/classes/{class_id}/questions"
    };
  }

  // 新增接口：单科题目汇总
  rpc GetSingleQuestionSummary (GetSingleQuestionSummaryRequest) returns (GetSingleQuestionSummaryReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/subjects/{subject_id}/questions"
    };
  }

  // 新增接口：单科班级题目详情
  rpc GetSingleQuestionDetail (GetSingleQuestionDetailRequest) returns (GetSingleQuestionDetailReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/subjects/{subject_id}/classes/{class_id}/questions/{question_id}"
    };
  }

  // 新增接口：四率分析
  rpc GetRatingDistribution (GetRatingDistributionRequest) returns (GetRatingDistributionReply) {
    option (google.api.http) = {
      get: "/seas/api/v1/exams/{exam_id}/analysis/rating-distribution"
    };
  }
}

// ============ 新增消息类型 ============

// 1. 考试列表
message ListExamsRequest {
  int32 page_index = 1;  // 默认1
  int32 page_size = 2;   // 默认20
}

message ExamInfo {
  string id = 1;
  string name = 2;
  string exam_date = 3;  // RFC3339格式
  string created_at = 4; // RFC3339格式
}

message ListExamsReply {
  repeated ExamInfo exams = 1;
  int64 total_count = 2;
  int32 page_index = 3;
  int32 page_size = 4;
}

// 2. 学科列表
message ListSubjectsByExamRequest {
  string exam_id = 1;
  int32 page_index = 2;  // 默认1
  int32 page_size = 3;   // 默认20
}

message SubjectBasicInfo {
  string id = 1;
  string name = 2;
  double full_score = 3;
}

message ListSubjectsByExamReply {
  string exam_id = 1;
  repeated SubjectBasicInfo subjects = 2;
  int64 total_count = 3;
  int32 page_index = 4;
  int32 page_size = 5;
}

// 3. 学科情况汇总
message GetSubjectSummaryRequest {
  string exam_id = 1;
  string scope = 2;           // "all_subjects" 或 "single_subject"
  string subject_id = 3;       // scope=single_subject时必传
}

message SubjectSummaryItem {
  string id = 1;
  string name = 2;
  double full_score = 3;
  double avg_score = 4;
  double highest_score = 5;
  double lowest_score = 6;
  double difficulty = 7;      // 平均分/满分*100
  int64 student_count = 8;
}

message GetSubjectSummaryReply {
  string exam_id = 1;
  string exam_name = 2;
  string scope = 3;
  int64 total_participants = 4;
  int32 subjects_involved = 5;    // 仅在 scope=all_subjects 时有意义
  int32 classes_involved = 6;     // 仅在 scope=all_subjects 时有意义
  repeated SubjectSummaryItem subjects = 7;
}

// 4. 班级情况汇总
message GetClassSummaryRequest {
  string exam_id = 1;
  string scope = 2;           // "all_subjects" 或 "single_subject"
  string subject_id = 3;       // scope=single_subject时必传
}

message ClassSummaryItem {
  string class_id = 1;
  string class_name = 2;
  int64 total_students = 3;
  double avg_score = 4;
  double highest_score = 5;
  double lowest_score = 6;
  double score_deviation = 7; // 离均差：班级平均分-全年级平均分，全年级固定为0
  double difficulty = 8;      // 平均分/满分*100
  double std_dev = 9;         // 标准差
}

message GetClassSummaryReply {
  string exam_id = 1;
  string exam_name = 2;
  string scope = 3;
  int64 total_participants = 4;
  ClassSummaryItem overall_grade = 5;
  repeated ClassSummaryItem class_details = 6;
}

// 5. 班级学科下钻
message GetClassSubjectSummaryRequest {
  string exam_id = 1;
  string class_id = 2;
}

message ClassSubjectItem {
  string subject_id = 1;
  string subject_name = 2;
  double full_score = 3;
  double class_avg_score = 4;
  double grade_avg_score = 5;
  double score_diff = 6;
  double class_highest = 7;
  double class_lowest = 8;
  int32 class_rank = 9;
  int32 total_classes = 10;
}

message GetClassSubjectSummaryReply {
  string exam_id = 1;
  string exam_name = 2;
  string class_id = 3;
  string class_name = 4;
  ClassSubjectItem overall = 5;
  repeated ClassSubjectItem subjects = 6;
}

// 6. 单科班级汇总
message GetSingleClassSummaryRequest {
  string exam_id = 1;
  string subject_id = 2;
}

message SingleClassSummaryItem {
  string class_id = 1;
  string class_name = 2;
  int64 total_students = 3;
  double subject_avg_score = 4;
  double grade_avg_score = 5;
  double score_diff = 6;
  int32 class_rank = 7;
  int32 total_classes = 8;
  double pass_rate = 9;
  double excellent_rate = 10;
}

message GetSingleClassSummaryReply {
  string exam_id = 1;
  string exam_name = 2;
  string subject_id = 3;
  string subject_name = 4;
  SingleClassSummaryItem overall = 5;
  repeated SingleClassSummaryItem classes = 6;
}

// 7. 单科班级题目汇总
message GetSingleClassQuestionsRequest {
  string exam_id = 1;
  string subject_id = 2;
  string class_id = 3;
}

message ClassQuestionItem {
  string question_id = 1;
  string question_number = 2;
  string question_type = 3;
  double full_score = 4;
  double class_avg_score = 5;
  double score_rate = 6;
  double grade_avg_score = 7;
  string difficulty = 8;
}

message GetSingleClassQuestionsReply {
  string exam_id = 1;
  string exam_name = 2;
  string subject_id = 3;
  string subject_name = 4;
  string class_id = 5;
  string class_name = 6;
  repeated ClassQuestionItem questions = 7;
}

// 8. 单科题目汇总
message GetSingleQuestionSummaryRequest {
  string exam_id = 1;
  string subject_id = 2;
}

message QuestionClassBreakdown {
  string class_id = 1;
  string class_name = 2;
  double avg_score = 3;
}

message SingleQuestionSummaryItem {
  string question_id = 1;
  string question_number = 2;
  string question_type = 3;
  double full_score = 4;
  double grade_avg_score = 5;
  repeated QuestionClassBreakdown class_breakdown = 6;
  double score_rate = 7;
  string difficulty = 8;
}

message GetSingleQuestionSummaryReply {
  string exam_id = 1;
  string exam_name = 2;
  string subject_id = 3;
  string subject_name = 4;
  repeated SingleQuestionSummaryItem questions = 5;
}

// 9. 单科班级题目详情
message GetSingleQuestionDetailRequest {
  string exam_id = 1;
  string subject_id = 2;
  string class_id = 3;
  string question_id = 4;
}

message StudentQuestionDetail {
  string student_id = 1;
  string student_name = 2;
  double score = 3;
  double full_score = 4;
  double score_rate = 5;
  int32 class_rank = 6;
  int32 grade_rank = 7;
  string answer_content = 8;
}

message GetSingleQuestionDetailReply {
  string exam_id = 1;
  string exam_name = 2;
  string subject_id = 3;
  string subject_name = 4;
  string class_id = 5;
  string class_name = 6;
  string question_id = 7;
  string question_number = 8;
  string question_type = 9;
  double full_score = 10;
  string question_content = 11;
  repeated StudentQuestionDetail students = 12;
}

// 10. 四率分析
message RatingConfig {
  double excellent_threshold = 1;  // 优秀分数线，默认90
  double good_threshold = 2;       // 良好分数线，默认70
  double pass_threshold = 3;       // 合格分数线，默认60
}

message GetRatingDistributionRequest {
  string exam_id = 1;
  string scope = 2;                     // "all_subjects" 或 "single_subject"
  string subject_id = 3;                 // scope=single_subject时必传
  double excellent_threshold = 4;       // 优秀分数线，默认90（可选）
  double good_threshold = 5;            // 良好分数线，默认70（可选）
  double pass_threshold = 6;            // 合格分数线，默认60（可选）
}

message RatingItem {
  int64 count = 1;
  double percentage = 2;  // 百分比，保留2位小数
}

message ClassRatingDistribution {
  string class_id = 1;
  string class_name = 2;
  int64 total_students = 3;
  double avg_score = 4;
  RatingItem excellent = 5;  // 优秀
  RatingItem good = 6;       // 良好
  RatingItem pass = 7;       // 合格
  RatingItem fail = 8;       // 低分
}

message GetRatingDistributionReply {
  string exam_id = 1;
  string exam_name = 2;
  string scope = 3;
  int64 total_participants = 4;
  RatingConfig config = 5;
  ClassRatingDistribution overall_grade = 6;
  repeated ClassRatingDistribution class_details = 7;
}
